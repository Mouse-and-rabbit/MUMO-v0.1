# MUMO ships a dark theme to match the product look (gradient logo, deep-navy
# canvas, teal accent). Users can still switch to Light from the top-right
# menu → Settings → Theme; the custom CSS in mumo_chat.py is dark-first.

[theme]
base = "dark"
primaryColor = "#2dd4bf"             # teal accent (buttons, focus, highlights)
backgroundColor = "#0a0e1a"          # main canvas — deep navy/black
secondaryBackgroundColor = "#111827" # sidebar + widgets
textColor = "#e2e8f0"                # soft white
font = "sans serif"

[server]
headless = true
port = 8501

[browser]
gatherUsageStats = false
